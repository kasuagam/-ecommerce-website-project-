        <h2>Login</h2>
        <input type="text" id="userlog" placeholder="username">
        <input type="password" id="passlogin" placeholder="password">
        <button onclick="login()">LOGIN</button>
        <p>Dont have an account ? <a href="register.html">Register!</a>

            <button onclick="logout()">Logout</button>

    </div>


    </div>

    <script>

        window.onload = function () {
            let currentuser = localStorage.getItem("currentuser");
            if (currentuser) {
                showDash(currentuser);
            }
        }


        function register() {
            let usen = document.getElementById("userReg").value;
            let pass = document.getElementById("passReg").value;

            if (usen === "" || pass === "") {
                alert("please fill the fields")
                return;
            }

            let user = {
                username: usen,
                password: pass
            };
            localStorage.setItem("user", JSON.stringify(user));
            alert("successfull");
            showLogin();

        }

        function login() {
            let usen = document.getElementById("userlog").value;
            let pass = document.getElementById("passlogin").value;

            let storageuser = JSON.parse(localStorage.getItem("user"));
            if (!storageuser) {
                alert("No user register");
                return;
            }

            if (usen === storageuser.username && pass === storageuser.password) {
                localStorage.setItem("currentuser", usen);
                showDash(usen);
            } else {
                alert("wrong credential");
            }

        }



        function logout() {
            localStorage.removeItem("currentuser");
            showLogin();
        }



        function showDash(username) {
            document.getElementById("registerDiv").classList.add("hidden");
            document.getElementById("loginDiv").classList.add("hidden");
            document.getElementById("dashbord").classList.remove("hidden");

            document.getElementById("welcometext").textContent = "Helloo   " + username;

        }

        function showLogin() {
            document.getElementById("registerDiv").classList.add("hidden");
            document.getElementById("loginDiv").classList.remove("hidden");
            document.getElementById("dashbord").classList.add("hidden");
        }

        function showRegis() {
            document.getElementById("registerDiv").classList.remove("hidden");
            document.getElementById("loginDiv").classList.add("hidden");
            document.getElementById("dashbord").classList.add("hidden");
        }
    </script>
